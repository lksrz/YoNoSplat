# @package _global_
#
# ┌──────────────────────────────────────────────────────────────────────┐
# │  VERSIONING RULE: Always create a backup before modifying this file │
# │  Copy to shoes_224_finetune_vN.yaml (increment N) before changes.  │
# │  Log changes in CHRONICLE.md at the project root.                  │
# │                                                                     │
# │  Current version: v4 (2026-03-08)                                  │
# │  Previous: shoes_224_finetune_v3.yaml                              │
# │                                                                     │
# │  v1: First training — LR 1e-5, 2 ctx, batch 4. Stable 50k steps,  │
# │      learned geometry but no color. Inference was broken (scene     │
# │      centre bug). Fixed inference shows recognizable shoe shape.    │
# │  v2: LR 2e-4, 6 ctx, batch 1. Gradient explosion at step 6880.    │
# │  v3: LR 5e-5, 6 ctx, batch 1. Collapsed again at step 12700.      │
# │  v4: Resume from v1 step 50k. Keep stable v1 params (LR 1e-5),    │
# │      increase ctx 2→4, boost silhouette/opacity to push color,     │
# │      disable augmentation (prevents mirrored shoes).               │
# └──────────────────────────────────────────────────────────────────────┘

defaults:
  - /dataset@_group_.shoes: shoes
  - override /model/encoder: yonosplat
  - override /model/encoder/backbone: local_global
  - override /loss: [mse, lpips, silhouette, opacity, intrinsic, pose]

wandb:
  name: shoes_224_finetune_v4
  tags: [shoes, 224x224, v4, resume-v1]

model:
  encoder:
    name: yonosplat
    pose_free: true
    pretrained_weights: ""
    # v1 used 5k→15k; keep same since model is already trained
    gt_pose_sampling_decay_start_step: 5000
    gt_pose_sampling_decay_end_step: 15000
    gt_pose_final_sample_ratio: 0.9
    backbone:
      predict_intrinsics: true
  decoder:
    make_scale_invariant: true
    prune_opacity_threshold: 0.1
    bounds_radius: 1.5

dataset:
  shoes:
    input_image_shape: [224, 224]
    original_image_shape: [512, 512]
    # Same as Run 1 actual config (inherited from base_dataset.yaml)
    relative_pose: true
    pose_norm_method: "max_pairwise_d"
    # v4: disable augmentation (prevents horizontal flips of asymmetric shoes)
    augment: false
    val_fraction: 0.05
    view_sampler:
      num_context_views: 4
      num_target_views: 1
      min_context_angle_deg: 20.0
      max_context_angle_deg: 60.0
      fallback_min_context_angle_deg: 10.0
      fallback_max_context_angle_deg: 90.0
      min_target_angle_deg: 5.0
      max_target_angle_deg: 25.0
      max_img_per_gpu: 8

optimizer:
  # v4: same LR as Run 1 — proven stable for 50k steps
  lr: 1e-5
  warm_up_steps: 1000
  backbone_lr_multiplier: 0.1

data_loader:
  train:
    num_workers: 4
    persistent_workers: true
    # v4: batch 2 (down from 4 to fit 4 ctx views on L40S-48GB)
    batch_size: 2
  val:
    num_workers: 0
    persistent_workers: false
  test:
    num_workers: 0
    persistent_workers: false

trainer:
  # Resume from step 50k, train 50k more
  max_steps: 100000
  val_check_interval: 5000

train:
  print_log_every_n_steps: 10
  eval_model_every_n_val: 0
  eval_data_length: 200
  eval_time_skip_steps: 3
  train_ignore_large_loss_after_steps: 20000
  # High thresholds — only catch genuine explosions
  train_ignore_large_loss: 5.0
  train_ignore_large_loss_mse: 1.0
  train_ignore_large_loss_pose: 5.0

checkpointing:
  every_n_train_steps: 500
  save_weights_only: false

loss:
  # v4: strong silhouette/opacity to force color and sharp edges
  silhouette:
    weight: 1.0
  opacity:
    weight: 0.2
