# @package _global_
#
# ┌──────────────────────────────────────────────────────────────────────┐
# │  VERSIONING RULE: Always create a backup before modifying this file │
# │  Copy to shoes_224_finetune_vN.yaml (increment N) before changes.  │
# │  Log changes in CHRONICLE.md at the project root.                  │
# │                                                                     │
# │  Current version: v5 (2026-03-09)                                  │
# │  Previous: shoes_224_finetune_v4.yaml                              │
# │                                                                     │
# │  v1: 2 ctx, batch 4, LR 1e-5. Best geometry but no color.         │
# │  v2: 6 ctx, LR 2e-4. Gradient explosion. FAILED.                  │
# │  v3: 6 ctx, LR 5e-5. Collapsed again. FAILED.                     │
# │  v4: Resume v1, 4 ctx. Worse than v1 (ctx change destructive).    │
# │  v5: Fresh DL3DV finetune. BLACK background to force color         │
# │      learning. Keep v1 stable params (2 ctx, batch 4, LR 1e-5).   │
# └──────────────────────────────────────────────────────────────────────┘

defaults:
  - /dataset@_group_.shoes: shoes
  - override /model/encoder: yonosplat
  - override /model/encoder/backbone: local_global
  - override /loss: [mse, lpips, silhouette, opacity, intrinsic, pose]

wandb:
  name: shoes_224_finetune_v5
  tags: [shoes, 224x224, v5, black-bg]

model:
  encoder:
    name: yonosplat
    pose_free: true
    pretrained_weights: ""
    # Same as Run 1
    gt_pose_sampling_decay_start_step: 5000
    gt_pose_sampling_decay_end_step: 15000
    gt_pose_final_sample_ratio: 0.9
    backbone:
      predict_intrinsics: true
  decoder:
    make_scale_invariant: true
    prune_opacity_threshold: 0.1
    bounds_radius: 1.5

dataset:
  shoes:
    input_image_shape: [224, 224]
    original_image_shape: [512, 512]
    # Let base_dataset.yaml defaults win: relative_pose=true, max_pairwise_d
    # (DO NOT override — Run 1 used these defaults and was stable)
    # v5: BLACK background — forces model to learn actual shoe colors
    # (white/random BG rewarded gray/white Gaussians → no color)
    train_background_mode: black
    eval_background_mode: black
    augment: false
    val_fraction: 0.05
    view_sampler:
      num_context_views: 2
      num_target_views: 1
      min_context_angle_deg: 20.0
      max_context_angle_deg: 60.0
      fallback_min_context_angle_deg: 10.0
      fallback_max_context_angle_deg: 90.0
      min_target_angle_deg: 5.0
      max_target_angle_deg: 25.0
      max_img_per_gpu: 8

optimizer:
  # Same as Run 1 — proven stable for 50k steps
  lr: 1e-5
  warm_up_steps: 1000
  backbone_lr_multiplier: 0.1

data_loader:
  train:
    num_workers: 4
    persistent_workers: true
    batch_size: 4
  val:
    num_workers: 0
    persistent_workers: false
  test:
    num_workers: 0
    persistent_workers: false

trainer:
  max_steps: 50000
  val_check_interval: 5000

train:
  print_log_every_n_steps: 10
  eval_model_every_n_val: 0
  eval_data_length: 200
  eval_time_skip_steps: 3
  train_ignore_large_loss_after_steps: 20000
  # High thresholds — only catch genuine explosions
  train_ignore_large_loss: 5.0
  train_ignore_large_loss_mse: 1.0
  train_ignore_large_loss_pose: 5.0

checkpointing:
  every_n_train_steps: 500
  save_weights_only: false

loss:
  # v5: moderate boost (not as aggressive as v4)
  silhouette:
    weight: 0.5
  opacity:
    weight: 0.1
