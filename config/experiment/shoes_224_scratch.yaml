# @package _global_
#
# ┌──────────────────────────────────────────────────────────────────────┐
# │  VERSIONING RULE: Always create a backup before modifying this file │
# │  Copy to shoes_224_scratch_vN.yaml (increment N) before changes.   │
# │  Log changes in CHRONICLE.md at the project root.                  │
# │                                                                     │
# │  Current version: v2 (2026-03-08)                                  │
# │  Previous: shoes_224_scratch_v1.yaml                               │
# │                                                                     │
# │  v1: Train from Pi3 backbone only, model-centric. Killed at step   │
# │      20k by MSE filter (threshold 0.06 too low for shoes).         │
# │  v2: Raise loss filter thresholds. Resume from v1 step 19500.      │
# └──────────────────────────────────────────────────────────────────────┘

defaults:
  - /dataset@_group_.shoes: shoes
  - override /model/encoder: yonosplat
  - override /model/encoder/backbone: local_global
  - override /loss: [mse, lpips, silhouette, opacity, intrinsic, pose]

wandb:
  name: shoes_224_scratch
  tags: [shoes, 224x224, scratch, pi3, v2]

model:
  encoder:
    name: yonosplat
    pose_free: true
    pretrained_weights: ""
    # From scratch: start GT pose decay later, let model stabilize first
    gt_pose_sampling_decay_start_step: 80000
    gt_pose_sampling_decay_end_step: 100000
    gt_pose_final_sample_ratio: 0.9
    backbone:
      predict_intrinsics: true
  decoder:
    make_scale_invariant: true
    prune_opacity_threshold: 0.1
    bounds_radius: 1.5

dataset:
  shoes:
    input_image_shape: [224, 224]
    original_image_shape: [512, 512]
    # Model-centric: object at origin, no relative pose shift
    relative_pose: false
    pose_norm_method: "none"
    augment: false
    val_fraction: 0.05
    view_sampler:
      num_context_views: 6
      num_target_views: 1
      min_context_angle_deg: 20.0
      max_context_angle_deg: 60.0
      fallback_min_context_angle_deg: 10.0
      fallback_max_context_angle_deg: 90.0
      min_target_angle_deg: 5.0
      max_target_angle_deg: 25.0
      max_img_per_gpu: 8

optimizer:
  # Higher LR for training from scratch
  lr: 1e-4
  warm_up_steps: 2000
  backbone_lr_multiplier: 0.1

data_loader:
  train:
    num_workers: 4
    persistent_workers: true
    batch_size: 1
  val:
    num_workers: 0
    persistent_workers: false
  test:
    num_workers: 0
    persistent_workers: false

trainer:
  max_steps: 150000
  val_check_interval: 5000

train:
  print_log_every_n_steps: 10
  eval_model_every_n_val: 0
  eval_data_length: 200
  eval_time_skip_steps: 3
  train_ignore_large_loss_after_steps: 20000
  # v2: raise thresholds — defaults (0.06 MSE, 0.2 total) killed training
  # at step 20k by skipping ALL samples. Set high to only catch explosions.
  train_ignore_large_loss: 5.0
  train_ignore_large_loss_mse: 1.0
  train_ignore_large_loss_pose: 5.0

checkpointing:
  every_n_train_steps: 500
  save_weights_only: false

loss:
  silhouette:
    weight: 1.0
  opacity:
    weight: 0.2
